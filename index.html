<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Latwun</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- IZQUIERDA -->
  <div class="left">
    <h2>Redes</h2>
    <a class="link" href="#">Instagram</a>
    <a class="link" href="#">YouTube</a>
    <a class="link" href="#">Itch.io</a>
    <a class="link" href="#">Twitter / X</a>
  </div>

  <!-- CENTRO -->
  <div class="center">
    <h1 class="glitch" data-text="Latwun">Latwun</h1>
    <p>Mi consola digital: cine, juegos y caos controlado.</p>
  </div>

  <!-- DERECHA -->
  <div class="right">
    <div class="movie-track">

      <div class="movie" onclick="openMovie('Blade Runner', 'Una obra maestra cyberpunk.', '9/10')">
        <img src="img/bladerunner.jpg">
        <div class="movie-title">Blade Runner</div>
        <div class="rating">9/10</div>
      </div>

      <div class="movie" onclick="openMovie('Interstellar', 'Viaje emocional y espacial.', '10/10')">
        <img src="img/interstellar.jpg">
        <div class="movie-title">Interstellar</div>
        <div class="rating">10/10</div>
      </div>

      <!-- DUPLICADO -->
      <div class="movie" onclick="openMovie('Blade Runner', 'Una obra maestra cyberpunk.', '9/10')">
        <img src="img/bladerunner.jpg">
        <div class="movie-title">Blade Runner</div>
        <div class="rating">9/10</div>
      </div>

    </div>
  </div>

</div>

<!-- 🎬 VENTANA PELÍCULA -->
<div id="movieModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeMovie()">X</span>
    <h2 id="movieTitle"></h2>
    <p id="movieDesc"></p>
    <p id="movieRating"></p>
  </div>
</div>

<!-- 🎵 MINI PLAYER -->
<div id="musicPlayer" class="player">
  <div class="player-header">🎵</div>
  <div class="player-body">
    <p id="songName">Song 1</p>
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()">⏯</button>
    <button onclick="nextSong()">⏭</button>
  </div>
</div>

<audio id="audio"></audio>

<div class="vhs-overlay"></div>

<script src="script.js"></script>
</body>
</html>

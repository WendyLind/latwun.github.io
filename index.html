<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Latwun</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- IZQUIERDA -->
  <div class="left">
    <h2>Redes</h2>

    <a class="link" href="#">Instagram</a>
    <a class="link" href="#">YouTube</a>
    <a class="link" href="#">Itch.io</a>
    <a class="link" href="#">Twitter / X</a>
  </div>

  <!-- CENTRO -->
  <div class="center">
    <h1 class="glitch" data-text="Latwun">Latwun</h1>
    <p>
      Bienvenido a mi espacio digital.  
      Aquí mezclo videojuegos, cine y proyectos experimentales.  
      Esta es una consola viva en constante evolución.
    </p>
  </div>

  <!-- DERECHA -->
  <div class="right">

    <div class="movie-track">

      <!-- PELÍCULAS -->
      <div class="movie">
        <img src="img/bladerunner.jpg">
        <div class="movie-title">Blade Runner</div>
        <div class="rating">9/10</div>
      </div>

      <div class="movie">
        <img src="img/interstellar.jpg">
        <div class="movie-title">Interstellar</div>
        <div class="rating">10/10</div>
      </div>

      <div class="movie">
        <img src="img/batman.jpg">
        <div class="movie-title">The Batman</div>
        <div class="rating">8/10</div>
      </div>

      <div class="movie">
        <img src="img/drive.jpg">
        <div class="movie-title">Drive</div>
        <div class="rating">9/10</div>
      </div>

      <!-- DUPLICADO PARA LOOP -->
      <div class="movie">
        <img src="img/bladerunner.jpg">
        <div class="movie-title">Blade Runner</div>
        <div class="rating">9/10</div>
      </div>

      <div class="movie">
        <img src="img/interstellar.jpg">
        <div class="movie-title">Interstellar</div>
        <div class="rating">10/10</div>
      </div>

    </div>

  </div>

</div>

<!-- CAPA VHS -->
<div class="vhs-overlay"></div>

</body>
</html>

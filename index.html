<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Latwun</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="vhs-overlay"></div>

<div class="layout">

<div class="left">

<div class="panel social-panel">

<div class="panel-title neon">
Redes
</div>

<div class="social-icons">

<a class="icon-link"
href="https://www.instagram.com/latwun_lel/"
target="_blank">

<img src="img/ig.png">

<span>Instagram</span>

</a>

<a class="icon-link"
href="https://www.youtube.com/@Latwun_2007"
target="_blank">

<img src="img/yt.png">

<span>YouTube</span>

</a>

<a class="icon-link"
href="https://latwun.itch.io"
target="_blank">

<img src="img/itch.png">

<span>Itch.io</span>

</a>

<a class="icon-link"
href="#"
target="_blank">

<img src="img/tiktok.png">

<span>TikTok</span>

</a>

</div>

</div>

<div class="panel music-panel">

<div class="panel-title neon">
Music
</div>

<div class="music-box">

<p>RADIO SYSTEM</p>

<p>COMING SOON...</p>

</div>

</div>

</div>

<div class="center">

<div class="panel center-top">

<img src="img/logo.png"
class="main-logo">

<p class="description">

Desarrollador indie de videojuegos,
webs experimentales, modelado 3D
y diseño 2D inspirado en estética retro.

</p>

</div>

<div class="panel center-bottom">

<div class="placeholder-box neon">

FUTURE MODULE

</div>

</div>

</div>

<div class="right">

<div class="panel metacritic-panel">

<div class="meta-header neon">
Mis Películas Favoritas
</div>

<div class="movie-track" id="track">

<div class="movie">

<img src="img/1.jpg">

<div class="movie-title">
Look Back
</div>

<div class="stars" data-rating="5"></div>

</div>

<div class="movie">

<img src="img/2.jpg">

<div class="movie-title">
Chainsaw Man: Reze Arc
</div>

<div class="stars" data-rating="5"></div>

</div>

<div class="movie">

<img src="img/3.jpg">

<div class="movie-title">
Exit 8
</div>

<div class="stars" data-rating="4"></div>

</div>

<div class="movie">

<img src="img/4.jpg">

<div class="movie-title">
Caveat
</div>

<div class="stars" data-rating="4"></div>

</div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>

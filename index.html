<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">

  <title>Latwun</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 📼 VHS -->
  <div class="vhs-overlay"></div>

  <div class="layout">

    <!-- =========================
         IZQUIERDA
    ========================== -->

    <div class="left">

      <h2 class="neon">Redes</h2>

      <a class="icon-link"
         href="https://www.instagram.com/latwun_lel/"
         target="_blank">

        <img src="img/ig.png">
        <span>Instagram</span>

      </a>

      <a class="icon-link"
         href="https://www.youtube.com/@Latwun_2007"
         target="_blank">

        <img src="img/yt.png">
        <span>YouTube</span>

      </a>

      <a class="icon-link"
         href="https://latwun.itch.io"
         target="_blank">

        <img src="img/itch.png">
        <span>Itch.io</span>

      </a>

    </div>

    <!-- =========================
         CENTRO
    ========================== -->

    <div class="center">

      <!-- ☕ LOGO -->
      <img src="img/logo.png"
           class="main-logo">

      <h1 class="neon main-title">
        Latwun
      </h1>

      <p class="description">
        Desarrollador indie de videojuegos,
        cine experimental y experiencias retro
        inspiradas en hardware clásico.
      </p>

    </div>

    <!-- =========================
         DERECHA
    ========================== -->

    <div class="right">

      <div class="meta-header neon">
        Mini Metacritic
      </div>

      <div class="movie-track" id="track">

        <div class="movie">
          <img src="img/1.jpg">
          <div class="movie-title">Look Back</div>
          <div class="stars" data-rating="5"></div>
        </div>

        <div class="movie">
          <img src="img/2.jpg">
          <div class="movie-title">Chainsaw Man: Reze Arc</div>
          <div class="stars" data-rating="5"></div>
        </div>

        <div class="movie">
          <img src="img/3.jpg">
          <div class="movie-title">Exit 8</div>
          <div class="stars" data-rating="4"></div>
        </div>

        <div class="movie">
          <img src="img/4.jpg">
          <div class="movie-title">Caveat</div>
          <div class="stars" data-rating="4"></div>
        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Latwun</title>

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
        rel="stylesheet">

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <div class="vhs-overlay"></div>

  <div class="layout">

    <!-- ========================= -->
    <!-- LEFT COLUMN -->
    <!-- ========================= -->

    <aside class="left-column">

      <div class="panel social-panel">

        <div class="panel-header">

          <h2 class="panel-title">
            Redes
          </h2>

        </div>

        <div class="social-grid">

          <a class="icon-link"
             href="https://www.instagram.com/latwun_lel/"
             target="_blank">

            <img src="img/ig.png"
                 alt="Instagram">

            <span>Instagram</span>

          </a>

          <a class="icon-link"
             href="https://www.youtube.com/@Latwun_2007"
             target="_blank">

            <img src="img/yt.png"
                 alt="YouTube">

            <span>YouTube</span>

          </a>

          <a class="icon-link"
             href="https://latwun.itch.io"
             target="_blank">

            <img src="img/itch.png"
                 alt="Itch">

            <span>Itch.io</span>

          </a>

          <a class="icon-link"
             href="#">

            <img src="img/tiktok.png"
                 alt="TikTok">

            <span>TikTok</span>

          </a>

        </div>

      </div>

      <div class="panel system-panel">

        <div class="panel-header">

          <h2 class="panel-title">
            Now Playing
          </h2>

        </div>

        <div class="system-content">

          <div class="music-player">

            <p class="music-title">
              LATWUN FM
            </p>

            <p class="music-track">
              Rola1.mp3
            </p>

            <button id="musicBtn"
                    class="music-btn">

              ⏸ PAUSE

            </button>

            <audio id="bgMusic"
                   loop>

              <source src="Music/Rola1.mp3"
                      type="audio/mpeg">

            </audio>

          </div>

        </div>

      </div>

    </aside>

    <!-- ========================= -->
    <!-- CENTER COLUMN -->
    <!-- ========================= -->

    <main class="center-column">

      <section class="top-section">

        <div class="logo-wrapper">

          <img src="img/logo.png"
               class="main-logo"
               alt="Latwun">

        </div>

        <p class="description">

          Creo videojuegos, mundos digitales
          y experiencias web con inspiración
          retro, horror psicológico
          y estética experimental.

        </p>

      </section>

      <section class="bottom-section">

        <div class="menu-grid">

          <a href="services.html"
             class="menu-button">

            SERVICES

          </a>

          <a href="blog.html"
             class="menu-button">

            BLOG

          </a>

          <a href="games.html"
             class="menu-button">

            GAMES

          </a>

        </div>

      </section>

    </main>

    <!-- ========================= -->
    <!-- RIGHT COLUMN -->
    <!-- ========================= -->

    <aside class="right-column">

      <div class="panel projects-panel">

        <div class="panel-header">

          <h2 class="panel-title">
            Projects
          </h2>

        </div>

        <div class="project-scroll"
             id="projectScroll">

          <div class="project-track"
               id="track">

            <div class="project">

              <img src="img/project1.jpg"
                   alt="Casa Tristam">

              <div class="project-title">
                Casa Tristam
              </div>

            </div>

            <div class="project">

              <img src="img/project2.jpg"
                   alt="Latwun Website">

              <div class="project-title">
                Latwun Website
              </div>

            </div>

            <div class="project">

              <img src="img/project3.jpg"
                   alt="3D Portfolio">

              <div class="project-title">
                3D Portfolio
              </div>

            </div>

            <div class="project">

              <img src="img/project4.jpg"
                   alt="Prototype">

              <div class="project-title">
                Prototype
              </div>

            </div>

            <div class="project">

              <img src="img/project5.jpg"
                   alt="Future Project">

              <div class="project-title">
                Coming Soon
              </div>

            </div>

          </div>

        </div>

      </div>

    </aside>

  </div>

  <script src="script.js"></script>

</body>

</html>

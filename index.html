<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Latwun</title>

    <link rel="icon"
          href="img/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@300;400;500&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="layout">

    <aside class="left">

        <div class="panel">

            <h2 class="panel-title">
                Redes
            </h2>

            <div class="social-grid">

                <a class="icon-link"
                   href="https://www.instagram.com/latwun_lel/"
                   target="_blank">

                    <img src="img/ig.png">

                    <span>Instagram</span>

                </a>

                <a class="icon-link"
                   href="https://www.youtube.com/@Latwun_2007"
                   target="_blank">

                    <img src="img/yt.png">

                    <span>YouTube</span>

                </a>

                <a class="icon-link"
                   href="https://latwun.itch.io"
                   target="_blank">

                    <img src="img/itch.png">

                    <span>Itch.io</span>

                </a>

                <a class="icon-link"
                   href="#">

                    <img src="img/tiktok.png">

                    <span>TikTok</span>

                </a>

            </div>

        </div>

    </aside>

    <main class="center">

        <img src="img/logo.png"
             class="main-logo">

        <p class="description">

            Desarrollador indie de videojuegos,
            páginas web experimentales,
            modelado 3D y diseño 2D
            inspirado en estética retro.

        </p>

        <div class="menu-buttons">

            <a href="servicios.html"
               class="menu-btn">

                Servicios

            </a>

            <a href="blog.html"
               class="menu-btn">

                Blog

            </a>

            <a href="juegos.html"
               class="menu-btn">

                Juegos

            </a>

        </div>

    </main>

    <aside class="right">

        <div class="panel movies-panel">

            <div class="panel-title">
                Mis Películas Favoritas
            </div>

            <div class="movie-scroll"
                 id="movieScroll">

                <div class="movie-track"
                     id="track">

                    <div class="movie">

                        <img src="img/1.jpg">

                        <div class="movie-title">
                            Look Back
                        </div>

                        <div class="stars"
                             data-rating="5"></div>

                    </div>

                    <div class="movie">

                        <img src="img/2.jpg">

                        <div class="movie-title">
                            Chainsaw Man: Reze Arc
                        </div>

                        <div class="stars"
                             data-rating="5"></div>

                    </div>

                    <div class="movie">

                        <img src="img/3.jpg">

                        <div class="movie-title">
                            Exit 8
                        </div>

                        <div class="stars"
                             data-rating="4"></div>

                    </div>

                    <div class="movie">

                        <img src="img/4.jpg">

                        <div class="movie-title">
                            Caveat
                        </div>

                        <div class="stars"
                             data-rating="4"></div>

                    </div>

                </div>

            </div>

        </div>

    </aside>

</div>

<script src="script.js"></script>

</body>

</html>

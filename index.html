<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Latwun</title>

<style>
  body {
    margin: 0;
    background: #050505;
    color: #fff;
    font-family: Arial, sans-serif;
  }

  /* CONTENEDOR GENERAL */
  .layout {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    height: 100vh;
  }

  /* COLUMNAS */
  .left, .right {
    padding: 20px;
    background: #0a0a0a;
    border-right: 1px solid #ff00ff33;
  }

  .right {
    border-right: none;
    border-left: 1px solid #ff00ff33;
    overflow-y: auto;
  }

  /* CENTRO */
  .center {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #1a001a, #000);
    text-align: center;
  }

  h1 {
    font-size: 3em;
    color: #ff00ff;
    text-shadow: 0 0 15px #ff00ff;
  }

  p {
    max-width: 400px;
    color: #ccc;
  }

  /* LINKS */
  .link {
    display: block;
    margin: 10px 0;
    padding: 10px;
    text-decoration: none;
    color: #ff00ff;
    border: 1px solid #ff00ff55;
    transition: 0.3s;
  }

  .link:hover {
    background: #ff00ff;
    color: black;
    box-shadow: 0 0 10px #ff00ff;
  }

  /* PELICULAS */
  .movie {
    margin-bottom: 20px;
    text-align: center;
  }

  .movie img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border: 2px solid #ff00ff55;
  }

  .movie-title {
    margin-top: 5px;
    font-size: 14px;
  }

  .rating {
    font-size: 12px;
    color: #ff00ff;
  }

  /* SCROLL estilo neón */
  .right::-webkit-scrollbar {
    width: 6px;
  }

  .right::-webkit-scrollbar-thumb {
    background: #ff00ff;
  }
</style>

</head>
<body>

<div class="layout">

  <!-- IZQUIERDA (REDES) -->
  <div class="left">
    <h2>Redes</h2>

    <a class="link" href="#">Instagram</a>
    <a class="link" href="#">YouTube</a>
    <a class="link" href="#">Itch.io</a>
    <a class="link" href="#">Twitter / X</a>

  </div>

  <!-- CENTRO -->
  <div class="center">
    <h1>Latwun</h1>
    <p>
      Bienvenido a mi espacio digital.  
      Aquí mezclo videojuegos, cine y proyectos experimentales.  
      Este sitio es como una consola viva: siempre cambiando, siempre creciendo.
    </p>
  </div>

  <!-- DERECHA (PELÍCULAS) -->
  <div class="right">

    <div class="movie">
      <img src="https://via.placeholder.com/300x450">
      <div class="movie-title">Blade Runner</div>
      <div class="rating">9/10</div>
    </div>

    <div class="movie">
      <img src="https://via.placeholder.com/300x450">
      <div class="movie-title">Interstellar</div>
      <div class="rating">10/10</div>
    </div>

    <div class="movie">
      <img src="https://via.placeholder.com/300x450">
      <div class="movie-title">The Batman</div>
      <div class="rating">8/10</div>
    </div>

    <div class="movie">
      <img src="https://via.placeholder.com/300x450">
      <div class="movie-title">Drive</div>
      <div class="rating">9/10</div>
    </div>

  </div>

</div>

</body>
</html>

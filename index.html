<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">

  <title>Latwun</title>

  <!-- 🧱 FUENTE PIXEL -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 📼 VHS -->
  <div class="vhs-overlay"></div>

  <div class="layout">

    <!-- =========================
         IZQUIERDA
    ========================== -->

    <div class="left">

      <h2 class="neon">Redes</h2>

      <!-- Instagram -->
      <a class="icon-link"
         href="https://www.instagram.com/latwun_lel/"
         target="_blank">

        <img src="img/ig.png" alt="Instagram">

        <span>Instagram</span>

      </a>

      <!-- YouTube -->
      <a class="icon-link"
         href="https://www.youtube.com/@Latwun_2007"
         target="_blank">

        <img src="img/yt.png" alt="YouTube">

        <span>YouTube</span>

      </a>

      <!-- Itch -->
      <a class="icon-link"
         href="https://latwun.itch.io"
         target="_blank">

        <img src="img/itch.png" alt="Itch.io">

        <span>Itch.io</span>

      </a>

    </div>

    <!-- =========================
         CENTRO
    ========================== -->

    <div class="center">

      <h1 class="neon main-title">
        Latwun
      </h1>

      <p class="description">
        Desarrollador indie enfocado en videojuegos,
        estética retro, pixelart y experiencias
        experimentales inspiradas en consolas clásicas.
      </p>

    </div>

    <!-- =========================
         DERECHA
    ========================== -->

    <div class="right">

      <!-- HEADER -->
      <div class="meta-header neon">
        Mini Metacritic
      </div>

      <!-- TRACK -->
      <div class="movie-track" id="track">

        <!-- LOOK BACK -->
        <div class="movie">

          <img src="img/1.jpg">

          <div class="movie-title">
            Look Back
          </div>

          <div class="stars" data-rating="5"></div>

        </div>

        <!-- CSM -->
        <div class="movie">

          <img src="img/2.jpg">

          <div class="movie-title">
            Chainsaw Man: Reze Arc
          </div>

          <div class="stars" data-rating="5"></div>

        </div>

        <!-- placeholders -->
        <div class="movie">
          <img src="img/3.png">
          <div class="movie-title">Exit 8</div>
          <div class="stars" data-rating="4"></div>
        </div>

        <div class="movie">
          <img src="img/placeholder.png">
          <div class="movie-title">Próximamente</div>
          <div class="stars" data-rating="0"></div>
        </div>

        <div class="movie">
          <img src="img/placeholder.png">
          <div class="movie-title">Próximamente</div>
          <div class="stars" data-rating="0"></div>
        </div>

        <div class="movie">
          <img src="img/placeholder.png">
          <div class="movie-title">Próximamente</div>
          <div class="stars" data-rating="0"></div>
        </div>

        <div class="movie">
          <img src="img/placeholder.png">
          <div class="movie-title">Próximamente</div>
          <div class="stars" data-rating="0"></div>
        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
